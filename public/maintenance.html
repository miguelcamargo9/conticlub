<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="300">
  <title>Conticlub — En mantenimiento</title>
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
    body {
      font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background-color: #000000;
      background-image: url("/files/assets/img/FONDO_CONTICLUB_OP2.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 620px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
    }
    .logo {
      width: 320px;
      max-width: 85%;
      height: auto;
      margin: 0 auto 40px;
      display: block;
      filter: drop-shadow(0 6px 24px rgba(255, 152, 0, 0.35));
    }
    h1 {
      font-size: 32px;
      font-weight: 400;
      margin: 0 0 20px;
      letter-spacing: 0.5px;
      color: #ffffff;
    }
    h1 .accent {
      color: #ff9800;
      font-weight: 500;
    }
    p {
      font-size: 17px;
      line-height: 1.65;
      margin: 0 0 14px;
      color: #e0e0e0;
      font-weight: 300;
    }
    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, #ff9800 20%, #ffa726 50%, #ff9800 80%, transparent 100%);
      margin: 28px auto;
      border: 0;
    }
    .dots {
      display: inline-flex;
      gap: 10px;
      margin-top: 8px;
      justify-content: center;
    }
    .dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff9800;
      opacity: 0.5;
      animation: bounce 1.4s infinite ease-in-out both;
      box-shadow: 0 0 12px rgba(255, 152, 0, 0.6);
    }
    .dots span:nth-child(1) { animation-delay: -0.32s; }
    .dots span:nth-child(2) { animation-delay: -0.16s; }
    .dots span:nth-child(3) { animation-delay: 0s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }
    .footer {
      margin-top: 44px;
      font-size: 13px;
      color: #9e9e9e;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .footer .brand {
      color: #ff9800;
      font-weight: 500;
    }
    @media (max-width: 480px) {
      .wrap   { padding: 32px 16px; }
      .logo   { width: 240px; margin-bottom: 28px; }
      h1      { font-size: 24px; }
      p       { font-size: 15px; }
      .footer { font-size: 11px; }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main" aria-live="polite">
    <img class="logo"
         alt="Conticlub 2.0"
         src="/files/assets/img/logo_1.png">
    <h1>Estamos <span class="accent">en mantenimiento</span></h1>
    <p>Estamos realizando mejoras para ofrecerte una mejor experiencia.</p>
    <p>Volveremos muy pronto. Gracias por tu paciencia.</p>
    <hr class="divider">
    <div class="dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <div class="footer">
      Conticlub &middot; <span class="brand">Continental</span>
    </div>
  </main>
</body>
</html>
